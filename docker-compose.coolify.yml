# MemPalace IEP fork — Coolify service definition
# version: 0.1
# phase: 2c (this file is consumed by Coolify when we deploy)
# locked architecture: MemPalace_Phase_2_Architecture_v0.2.md (A2, A4, A8)
#
# How Coolify uses this:
#   - Coolify clones the repo, finds this file, and runs `docker compose up`
#     inside its own managed environment (which provides traefik / proxy
#     wiring and secrets injection).
#   - The MEMPALACE_BEARER_TOKEN comes from Coolify's secret store, NOT from
#     a committed .env file. Set it once in the Coolify UI before first deploy.
#   - The Cloudflare tunnel (mempalace.tstly.dev → this container) is
#     configured separately in 2d via the existing cloudflared service.
#
# Local smoke-test:
#   echo "MEMPALACE_BEARER_TOKEN=$(python -c 'import secrets; print(secrets.token_urlsafe(32))')" > .env.local
#   docker compose -f docker-compose.coolify.yml --env-file .env.local up --build
#   ./smoke_test.sh http://localhost:8000 "$(grep MEMPALACE_BEARER_TOKEN .env.local | cut -d= -f2)"

services:
  mempalace-http:
    container_name: mempalace-http
    build:
      context: .
      dockerfile: Dockerfile
    image: mempalace-iep:0.1
    restart: unless-stopped

    # ── Auth and config ────────────────────────────────────────────────
    # Using the array form (no value) so Coolify's runtime env injection
    # fills the secrets in. The map form `KEY: ${KEY}` substitutes from
    # the compose shell BEFORE Coolify can inject, which silently resolves
    # to empty and crashes the wrapper at startup.
    #
    # Required runtime secrets (set in Coolify Environment Variables UI):
    #   MEMPALACE_BEARER_TOKEN       — static bearer (laptop CLI diagnostics)
    #   MEMPALACE_OAUTH_CLIENT_ID    — Phase 10: client_credentials grant
    #   MEMPALACE_OAUTH_CLIENT_SECRET — Phase 10
    #   MEMPALACE_OAUTH_JWT_SECRET   — Phase 10: HS256 signing key (>=32 chars)
    environment:
      - MEMPALACE_BEARER_TOKEN
      - MEMPALACE_OAUTH_CLIENT_ID
      - MEMPALACE_OAUTH_CLIENT_SECRET
      - MEMPALACE_OAUTH_JWT_SECRET
      - MEMPAL_PALACE_PATH=/data/.mempalace/palace
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO

    # ── Networking ─────────────────────────────────────────────────────
    # cloudflared runs on the Coolify host and routes Cloudflare tunnel
    # public hostnames → host ports (NOT into the Docker network). So we
    # bind a unique host port. Port 5042 chosen to slot cleanly into the
    # IEP fleet: cms-dev=5036, voice-mcp=5040, claude-brain=5042,
    # tstly.dev=5050. (8000 is already allocated on the host by something
    # else and conflicts; do not reuse.)
    # Cloudflare public hostname `claude-brain.tstly.dev` → http://localhost:5042
    # is configured separately in the cloudflared tunnel routes.
    ports:
      - "5042:8000"

    # ── Persistent storage ─────────────────────────────────────────────
    # ChromaDB palace, WAL, config.json, identity.txt all live under /data.
    # Single named volume keeps backups simple.
    volumes:
      - mempalace_data:/data

    # ── Health and resources (A8) ──────────────────────────────────────
    # Compose-level healthcheck mirrors the Dockerfile HEALTHCHECK; Coolify
    # uses the more granular timing here for restart decisions.
    healthcheck:
      # /health is a lightweight liveness check (returns ok if the wrapper
      # process is alive — does NOT round-trip to the StdioProxy subprocess).
      # The deeper readiness check is /ready (used by clients, not Docker).
      # start_period bumped to 120s to give ChromaDB's first-time ONNX model
      # download room to complete without Docker killing the container.
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

    # Standard production logging knobs — keep last 10×10MB of stdout per
    # container. Coolify's log viewer reads these too.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "10"

# ── Volumes ───────────────────────────────────────────────────────────
# Named volume; Coolify backs this up if backup is configured for the project.
volumes:
  mempalace_data:
    name: mempalace_data
